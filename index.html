<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sigma 与 Pi 键 3D 演示</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='22' cy='32' r='14' fill='%234cc7b6'/%3E%3Ccircle cx='42' cy='32' r='14' fill='%23f06449'/%3E%3Cellipse cx='32' cy='32' rx='18' ry='7' fill='%23f3cc62' opacity='.8'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main id="app">
      <section class="stage" aria-label="sigma pi bond interactive demo">
        <canvas id="scene"></canvas>
        <div class="topbar">
          <div>
            <p class="eyebrow">3D 化学键形成演示</p>
            <h1>Sigma 键与 Pi 键</h1>
          </div>
          <div class="mode-tabs" role="tablist" aria-label="选择演示模式">
            <button class="mode active" data-mode="sigma" role="tab" aria-selected="true">σ</button>
            <button class="mode" data-mode="pi" role="tab" aria-selected="false">π</button>
            <button class="mode" data-mode="double" role="tab" aria-selected="false">σ + π</button>
          </div>
        </div>
        <aside class="panel" aria-live="polite">
          <h2 id="mode-title">Sigma 键形成</h2>
          <p id="mode-copy">两个原子轨道沿核间轴端对端重叠，电子密度集中在两个原子核之间。</p>
          <div class="legend">
            <span><i class="swatch positive"></i>正相位</span>
            <span><i class="swatch negative"></i>负相位</span>
            <span><i class="swatch density"></i>成键电子密度</span>
          </div>
          <label class="control">
            <span>形成过程</span>
            <input id="progress" type="range" min="0" max="100" value="46" />
          </label>
          <label class="control">
            <span>动画速度</span>
            <input id="speed" type="range" min="0" max="100" value="38" />
          </label>
          <label class="toggle">
            <input id="phase-toggle" type="checkbox" checked />
            <span>显示轨道相位</span>
          </label>
          <div class="callouts">
            <p id="callout-a">核间轴上的重叠越强，σ 键越稳定。</p>
            <p id="callout-b">拖动模型可从任意角度观察轨道重叠。</p>
          </div>
        </aside>
        <div class="axis-label sigma-axis">核间轴</div>
      </section>
    </main>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.181.2/build/three.module.js",
          "three/examples/jsm/controls/OrbitControls.js": "https://cdn.jsdelivr.net/npm/three@0.181.2/examples/jsm/controls/OrbitControls.js"
        }
      }
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
